<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Deploy AI workflows that monitor your business automatically. Connect Google Sheets, websites, or webhooks — Hoursback analyzes changes and sends clear insights to your inbox." />
  <meta name="theme-color" content="#0A0A0A" />
  <title>Hoursback – Get Hours Back Every Week</title>

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://hoursback.xyz/" />
  <meta property="og:title" content="Hoursback – AI Workflows for Your Business" />
  <meta property="og:description" content="Deploy AI workflows that monitor your business automatically. Connect Google Sheets, websites, or webhooks — get clear insights delivered to your inbox on your schedule." />
  <meta property="og:image" content="https://hoursback.xyz/logo.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Hoursback – AI Workflows for Your Business" />
  <meta name="twitter:description" content="Deploy AI workflows that monitor your business automatically. Get clear insights delivered to your inbox on your schedule." />
  <meta name="twitter:image" content="https://hoursback.xyz/logo.png" />
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    (function (l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
  <!-- Flutterwave Inline Script -->
  <script src="https://checkout.flutterwave.com/v3.js"></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>

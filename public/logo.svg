<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 182 42" fill="none">
  <!--
    HoursBack logo
    Icon: bold counter-clockwise arc with clock hands inside
    Background: fully transparent
  -->

  <!-- 270° counter-clockwise arc -->
  <!-- centre (21,21) radius 13 — from 12 o'clock (21,8) CCW to 3 o'clock (34,21) -->
  <path d="M 21,8 A 13,13 0 1,0 34,21"
        stroke="#4285F4" stroke-width="3.6" stroke-linecap="round"/>

  <!-- Clock hands (10:10 — classic spread) -->
  <!-- Hour hand → 10 o'clock: length 7.5 -->
  <line x1="21" y1="21" x2="14.5" y2="17.2"
        stroke="#202124" stroke-width="2" stroke-linecap="round"/>
  <!-- Minute hand → 2 o'clock: length 10 -->
  <line x1="21" y1="21" x2="29.7" y2="16"
        stroke="#202124" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Centre pivot dot -->
  <circle cx="21" cy="21" r="2" fill="#4285F4"/>

  <!-- Wordmark -->
  <text
    x="49" y="27"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="600"
    font-size="20"
    fill="#202124"
    letter-spacing="-0.3"
  >hoursback</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 182 42" fill="none">
  <!--
    HoursBack logo
    Icon: bold counter-clockwise arc (undo/rewind symbol) — "get your hours back"
    Mark: hoursback wordmark in dark semi-bold
    Background: fully transparent
  -->

  <!-- 270° counter-clockwise arc  -->
  <!-- centre (21,21) radius 13 — from 12 o'clock (21,8) CCW to 3 o'clock (34,21) -->
  <path d="M 21,8 A 13,13 0 1,0 34,21"
        stroke="#4285F4" stroke-width="3.6" stroke-linecap="round"/>

  <!-- Arrowhead at 3 o'clock — points downward (direction of CCW travel) -->
  <polygon points="30,21 38,21 34,27.5" fill="#4285F4"/>

  <!-- Small pivot dot — clock centre -->
  <circle cx="21" cy="21" r="2.2" fill="#4285F4"/>

  <!-- Wordmark -->
  <text
    x="49" y="27"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="600"
    font-size="20"
    fill="#202124"
    letter-spacing="-0.3"
  >hoursback</text>
</svg>
